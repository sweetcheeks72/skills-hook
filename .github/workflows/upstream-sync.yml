name: Upstream Sync

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "helios-sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"

      - name: Add upstream
        run: git remote add upstream https://github.com/nicobailon/skills-hook.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for new commits
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          LOCAL_SHA=$(git rev-parse main)
          if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ]; then
            echo "new_commits=0" >> $GITHUB_OUTPUT
          else
            COUNT=$(git rev-list main..upstream/main --count)
            echo "new_commits=$COUNT" >> $GITHUB_OUTPUT
            echo "::notice::$COUNT new commits from upstream"
          fi

      - name: Fast-forward
        if: steps.check.outputs.new_commits != '0'
        run: |
          git merge upstream/main --ff-only
          git push origin main

      - name: Sync tags
        if: steps.check.outputs.new_commits != '0'
        run: git push origin --tags
